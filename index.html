<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutracker Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Минималистичный глубокий черный дизайн */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        /* Поле ввода */
        input {
            width: 100%;
            padding: 12px;
            background-color: #121212;
            border: 1px solid #222222;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 12px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #444444;
        }

        /* Кнопки */
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 20px;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.8;
        }

        /* Список категорий */
        .categories {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cat-btn {
            background-color: #121212;
            color: #ffffff;
            border: 1px solid #222222;
            text-align: left;
            padding: 14px;
            margin-bottom: 0;
            border-radius: 8px;
        }
        .cat-btn:active {
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div class="container">
        <input type="text" id="search-input" placeholder="Поиск по релизам...">
        <button id="search-btn">Найти</button>

        <div class="categories">
            <button class="cat-btn" onclick="selectCategory('🎬 Кино')">🎬 Кино</button>
            <button class="cat-btn" onclick="selectCategory('📺 Сериалы')">📺 Сериалы</button>
            <button class="cat-btn" onclick="selectCategory('🎮 Игры')">🎮 Игры</button>
            <button class="cat-btn" onclick="selectCategory('📚 Книги')">📚 Книги</button>
            <button class="cat-btn" onclick="selectCategory('🎵 Музыка')">🎵 Музыка</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // Разворачиваем приложение на максимум

        // Функция поиска
        document.getElementById('search-btn').addEventListener('click', () => {
            const query = document.getElementById('search-input').value.trim();
            if (query) {
                // Вместо sendData используем switchInlineQuery, чтобы передать запрос боту без закрытия приложения
                tg.switchInlineQuery(query, ["users", "chats", "groups"]);
            }
        });

        // Функция выбора категории
        function selectCategory(categoryName) {
            tg.switchInlineQuery(categoryName, ["users", "chats", "groups"]);
        }
    </script>
</body>
</html>
