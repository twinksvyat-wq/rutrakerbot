<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutracker Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Полный AMOLED черный стиль */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .container { width: 100%; max-width: 400px; margin: 0 auto; }
        
        /* Поле ввода */
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; }
        input {
            flex: 1; padding: 12px; background-color: #0d0d0d;
            border: 1px solid #1a1a1a; border-radius: 8px; color: #ffffff;
            font-size: 15px; outline: none;
        }
        input:focus { border-color: #333333; }
        button {
            padding: 12px 20px; background-color: #ffffff; color: #000000;
            border: none; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer;
        }
        
        /* Сетка категорий */
        .categories { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 24px; }
        .cat-btn {
            background-color: #0d0d0d; color: #ffffff; border: 1px solid #1a1a1a;
            padding: 14px; border-radius: 8px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer;
        }
        .cat-btn:active { background-color: #1a1a1a; }
        
        .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #444444; margin-bottom: 10px; font-weight: 700; }
        
        /* Карточки истории */
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .torrent-card {
            background-color: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 8px;
            padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .torrent-title { font-size: 13px; color: #888888; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; padding-right: 10px; }
        .torrent-size { font-size: 11px; font-weight: 700; color: #666666; background-color: #050505; padding: 4px 6px; border-radius: 4px; border: 1px solid #151515; }
        .no-history { text-align: center; padding: 20px; color: #333333; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Поиск на Рутрекере...">
            <button onclick="triggerInlineSearch()">Найти</button>
        </div>

        <div class="categories">
            <div class="cat-btn" onclick="searchCat('🎬 Кино')">🎬 Кино</div>
            <div class="cat-btn" onclick="searchCat('📺 Сериалы')">📺 Сериалы</div>
            <div class="cat-btn" onclick="searchCat('🎮 Игры')">🎮 Игры</div>
            <div class="cat-btn" onclick="searchCat('📚 Книги')">📚 Книги</div>
        </div>

        <div class="section-title">История просмотров</div>
        <div class="history-list" id="history-box"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Поиск по кнопке
        function triggerInlineSearch() {
            const val = document.getElementById('search-input').value.trim();
            if(!val) return;
            saveToLocalHistory(val, "🔍 Поиск");
            // Вызываем встроенное окно результатов
            tg.switchInlineQuery(val, ["users", "chats", "groups"]);
        }

        // Поиск по категории
        function searchCat(name) {
            saveToLocalHistory(name, "📂 Категория");
            tg.switchInlineQuery(name, ["users", "chats", "groups"]);
        }

        // Сохранение в локальную историю Mini App
        function saveToLocalHistory(title, type) {
            let history = JSON.parse(localStorage.getItem('rt_app_history') || '[]');
            history = history.filter(h => h.title !== title);
            history.unshift({ title: title, type: type });
            if(history.length > 5) history.pop();
            localStorage.setItem('rt_app_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const box = document.getElementById('history-box');
            box.innerHTML = '';
            let history = JSON.parse(localStorage.getItem('rt_app_history') || '[]');
            
            if(history.length === 0) {
                box.innerHTML = '<div class="no-history">История пуста</div>';
                return;
            }

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'torrent-card';
                div.onclick = () => {
                    tg.switchInlineQuery(item.title, ["users", "chats", "groups"]);
                };
                div.innerHTML = `
                    <div class="torrent-title">${item.title}</div>
                    <div class="torrent-size">${item.type}</div>
                `;
                box.appendChild(div);
            });
        }

        // Рендерим историю при запуске окна
        window.addEventListener('DOMContentLoaded', renderHistory);
    </script>
</body>
</html>
