<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutracker Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #f1f5f9; font-family: system-ui, sans-serif; -webkit-user-select: none; user-select: none; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col justify-between">

    <div class="w-full">
        <div id="screen-main" class="space-y-5">
            <div class="flex items-center justify-between mt-2">
                <div>
                    <h1 class="text-xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-indigo-500">RUTRACKER APP</h1>
                    <p class="text-[10px] text-slate-500 font-semibold tracking-wider uppercase">Интерфейс зеркала v1.3</p>
                </div>
                <div class="bg-emerald-500/10 text-emerald-400 text-[10px] px-2.5 py-1 rounded-full font-bold border border-emerald-500/20 flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span> Online
                </div>
            </div>

            <div class="relative flex items-center">
                <input id="search-input" type="text" placeholder="Введите название раздачи..." class="w-full pl-4 pr-12 py-3.5 bg-slate-900/90 rounded-2xl border border-slate-800 focus:outline-none focus:border-cyan-500/60 text-sm placeholder-slate-500 text-slate-200 shadow-inner">
                <button onclick="triggerSearch()" class="absolute right-2 p-2 bg-gradient-to-r from-cyan-500 to-blue-600 rounded-xl font-bold text-xs shadow-md active:scale-95 transition-transform">Найти</button>
            </div>

            <div>
                <h2 class="text-[11px] font-black uppercase tracking-widest text-slate-500 mb-3">Быстрый каталог</h2>
                <div class="grid grid-cols-2 gap-2 text-xs font-bold">
                    <button onclick="triggerCat('9')" class="p-3.5 bg-slate-900/40 border border-slate-900 rounded-xl text-left hover:border-slate-800 active:bg-slate-900 flex items-center gap-2">🎮 Игры</button>
                    <button onclick="triggerCat('7')" class="p-3.5 bg-slate-900/40 border border-slate-900 rounded-xl text-left hover:border-slate-800 active:bg-slate-900 flex items-center gap-2">🎬 Кино</button>
                    <button onclick="triggerCat('189')" class="p-3.5 bg-slate-900/40 border border-slate-900 rounded-xl text-left hover:border-slate-800 active:bg-slate-900 flex items-center gap-2">📺 Сериалы</button>
                    <button onclick="triggerCat('10')" class="p-3.5 bg-slate-900/40 border border-slate-900 rounded-xl text-left hover:border-slate-800 active:bg-slate-900 flex items-center gap-2">📚 Книги</button>
                </div>
            </div>

            <div id="results-section" class="space-y-3 pt-2">
                <div class="flex justify-between items-center">
                    <h2 class="text-[11px] font-black uppercase tracking-widest text-slate-500">Результаты в приложении</h2>
                    <span id="counter-text" class="text-[10px] text-slate-500 font-bold">Показано: 1-5 из 5</span>
                </div>
                
                <div id="results-list" class="space-y-2">
                    </div>

                <div class="flex gap-2 pt-1">
                    <button id="btn-prev" onclick="changePage(-1)" class="w-1/2 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl text-xs font-bold active:bg-slate-900 disabled:opacity-40">⬅️ Назад</button>
                    <button id="btn-next" onclick="changePage(1)" class="w-1/2 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl text-xs font-bold active:bg-slate-900 disabled:opacity-40">Вперед ➡️</button>
                </div>
            </div>
        </div>

        <div id="screen-details" class="hidden space-y-5">
            <button onclick="backToMain()" class="text-xs text-cyan-400 font-bold bg-cyan-500/5 px-3 py-1.5 rounded-lg border border-cyan-500/10 active:scale-95 transition-transform">⬅️ Вернуться к списку</button>
            
            <div class="bg-slate-900/50 border border-slate-800/80 p-5 rounded-2xl space-y-4 shadow-xl">
                <div class="bg-cyan-500/10 text-cyan-400 text-[9px] uppercase font-black px-2 py-1 rounded w-max tracking-widest border border-cyan-500/10">Спецификация торрента</div>
                <h3 id="det-title" class="text-base font-bold leading-snug text-slate-100"></h3>
                
                <div class="space-y-2 border-t border-slate-800/60 pt-4 text-xs">
                    <div class="flex justify-between items-center text-slate-400">
                        <span>Вес раздачи:</span>
                        <span id="det-size" class="font-bold text-cyan-400 text-sm"></span>
                    </div>
                    <div class="flex justify-between items-center text-slate-400">
                        <span>Статус хэша:</span>
                        <span class="text-emerald-400 font-medium">Проверен ✅</span>
                    </div>
                </div>
            </div>

            <button id="download-btn" class="w-full py-4 bg-gradient-to-r from-cyan-500 via-blue-600 to-indigo-600 rounded-xl font-black text-center text-white shadow-lg active:scale-[0.98] transition-transform tracking-wider text-sm">
                📥 СКАЧАТЬ TORRENT ФАЙЛ
            </button>
        </div>
    </div>

    <div class="text-center text-[10px] text-slate-600 font-medium pt-6">
        Интерфейс взаимодействует напрямую с основным ядром бота.
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Тестовые данные для демонстрации интерфейса при первом клике
        let allData = [
            {tid: "6453210", title: "Cyberpunk 2077: Phantom Liberty (v2.12) [Ru/En] RePack от xatab", size: "78.4 GB"},
            {tid: "6123456", title: "Cyberpunk 2077 [v2.11] (2020) PC | Лицензия GOG", size: "54.1 GB"},
            {tid: "5987412", title: "Cyberpunk 2077 (Original Game Soundtrack) [FLAC]", size: "840 MB"},
            {tid: "5412399", title: "Ведьмак 3: Дикая Охота / The Witcher 3 (v4.04) [RePack]", size: "62.8 GB"},
            {tid: "4875123", title: "Cyberpunk 2077 - Официальный Артбук Мира Игры [PDF]", size: "140 MB"}
        ];
        
        let currentPage = 0;
        const itemsPerPage = 5;

        function renderList() {
            const container = document.getElementById('results-list');
            container.innerHTML = '';
            
            const start = currentPage * itemsPerPage;
            const end = start + itemsPerPage;
            const chunk = allData.slice(start, end);

            chunk.forEach(item => {
                const div = document.createElement('div');
                div.className = "p-3.5 bg-slate-900/30 border border-slate-900/80 rounded-xl flex justify-between items-center active:bg-slate-900/80 cursor-pointer transition-all";
                div.onclick = () => openDetails(item);
                div.innerHTML = `
                    <div class="pr-3"><p class="text-xs font-semibold text-slate-300 line-clamp-2 leading-tight">${item.title}</p></div>
                    <span class="text-[10px] font-black text-cyan-400 bg-cyan-950/30 px-2 py-1 rounded border border-cyan-900/30 whitespace-nowrap">${item.size}</span>
                `;
                container.appendChild(div);
            });

            document.getElementById('counter-text').innerText = `Показано: ${start + 1}-${Math.min(end, allData.length)} из ${allData.length}`;
            document.getElementById('btn-prev').disabled = currentPage === 0;
            document.getElementById('btn-next').disabled = end >= allData.length;
        }

        function changePage(direction) {
            currentPage += direction;
            renderList();
        }

        function triggerSearch() {
            const val = document.getElementById('search-input').value.trim();
            if(!val) return;
            tg.sendData("search:" + val);
            tg.close();
        }

        function triggerCat(fid) {
            tg.sendData("cat:" + fid);
            tg.close();
        }

        function openDetails(item) {
            document.getElementById('screen-main').classList.add('hidden');
            document.getElementById('screen-details').classList.remove('hidden');
            document.getElementById('det-title').innerText = item.title;
            document.getElementById('det-size').innerText = item.size;
            document.getElementById('download-btn').onclick = () => {
                tg.sendData("download:" + item.tid);
                tg.close();
            };
        }

        function backToMain() {
            document.getElementById('screen-details').classList.add('hidden');
            document.getElementById('screen-main').classList.remove('hidden');
        }

        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') triggerSearch();
        });

        window.addEventListener('DOMContentLoaded', () => {
            renderList();
        });
    </script>
</body>
  </html>
