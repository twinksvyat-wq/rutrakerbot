name: Run Rutracker Bot

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '*/30 * * * *' # Запуск проверки каждые 30 минут для стабильности 24/7
  workflow_dispatch: # Позволяет запускать бота вручную кнопкой Run workflow

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1 # Скачивает только последний коммит (защита от зависания checkout)

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Bot with Timeout
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        RUTRACKER_LOGIN: ${{ secrets.RUTRACKER_LOGIN }}
        RUTRACKER_PASSWORD: ${{ secrets.RUTRACKER_PASSWORD }}
      # timeout 3000 держит бота включенным 50 минут, после чего мягко завершает процесс.
      # Новая задача на запуск подхватит его по расписанию.
      run: timeout 3000 python -u bot.py || true
